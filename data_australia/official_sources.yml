sources:
  - id: qfd_qfes
    name: Queensland Fire Department / QFES
    url: https://www.fire.qld.gov.au/
    scope: [queensland, fire, preparedness, warnings]
    purpose: Queensland fire safety, bushfire preparedness, warnings, and incident guidance.
    use_when: Verify bushfire warnings, fire preparedness guidance, or Queensland fire agency information.

  - id: get_ready_qld_bushfire
    name: Get Ready Queensland - Current Bushfire Incidents
    url: https://www.getready.qld.gov.au/alerts-and-warnings/current-bushfire-incidents
    scope: [queensland, bushfire, incidents, warnings]
    purpose: Queensland current bushfire incident entry point and public warning information.
    use_when: Remind users to verify current bushfire incidents through official Queensland sources.

  - id: qld_current_warnings
    name: Queensland Government Current Warnings
    url: https://www.disaster.qld.gov.au/current-warnings
    scope: [queensland, disaster, warnings]
    purpose: Queensland government current disaster warnings and emergency information.
    use_when: Verify state-level disaster warnings, severe weather, and emergency information.

  - id: cairns_disaster
    name: Cairns Regional Council Disaster Information
    url: https://www.cairns.qld.gov.au/community-and-environment/natural-disasters/stay-informed
    scope: [cairns, council, local, disaster]
    purpose: Cairns local disaster information, council updates, and local service impacts.
    use_when: The location is Cairns or the report needs local council disaster information.

  - id: bom_qld_warnings
    name: Bureau of Meteorology Queensland Warnings
    url: https://www.bom.gov.au/qld/warnings/
    scope: [queensland, weather, fire_weather, warnings]
    purpose: Queensland weather warnings, fire weather, heat, smoke-related weather context, and severe weather information.
    use_when: Verify weather, heat, smoke, fire weather, or severe weather risk.

  - id: nsw_rfs_fires_near_me
    name: NSW Rural Fire Service - Fires Near Me
    url: https://www.rfs.nsw.gov.au/fire-information/fires-near-me
    scope: [new_south_wales, nsw, fire, bushfire, incidents, warnings]
    purpose: NSW bush and grass fire incident, alert level and preparedness information entry point.
    use_when: Verify NSW bushfire incidents, alert levels, fire danger context or RFS public information.

  - id: emergency_victoria
    name: VicEmergency - Incidents and Warnings
    url: https://www.emergency.vic.gov.au/respond/
    scope: [victoria, vic, fire, bushfire, incidents, warnings]
    purpose: Victoria incidents and warnings entry point for fire, flood, storm, heat and other emergencies.
    use_when: Verify Victorian emergency warnings, evacuation action statements, fire incidents or preparedness context.

  - id: emergency_wa
    name: Emergency WA - Warnings and Incidents
    url: https://www.emergency.wa.gov.au/
    scope: [western_australia, wa, fire, bushfire, incidents, warnings]
    purpose: Western Australia emergency warnings and incidents entry point managed through WA emergency services.
    use_when: Verify WA bushfire warnings, fire incidents, community alerts or emergency updates.

  - id: alert_sa
    name: Alert SA
    url: https://www.alert.sa.gov.au/
    scope: [south_australia, sa, fire, bushfire, incidents, warnings]
    purpose: South Australia warnings and incidents entry point for bushfire and other emergencies.
    use_when: Verify South Australian bushfire warnings, incident information or emergency updates.

  - id: tasalert
    name: TasALERT
    url: https://alert.tas.gov.au/
    scope: [tasmania, tas, fire, bushfire, incidents, warnings]
    purpose: Tasmania alerts and incidents entry point for emergency public information.
    use_when: Verify Tasmanian alerts, incidents and official emergency updates.

  - id: tasmania_fire_service
    name: Tasmania Fire Service
    url: https://www.fire.tas.gov.au/
    scope: [tasmania, tas, fire, bushfire, preparedness]
    purpose: Tasmania fire safety, bushfire preparation, restrictions, fire danger and community protection information.
    use_when: Verify Tasmanian fire preparedness, restrictions, fire danger or TFS public guidance.

  - id: act_esa
    name: ACT Emergency Services Agency
    url: https://esa.act.gov.au/
    scope: [australian_capital_territory, act, fire, bushfire, incidents, warnings]
    purpose: ACT emergency services, incidents, warnings, bushfire preparedness and fire danger information.
    use_when: Verify ACT emergency alerts, incidents, bushfire preparation guidance or fire danger information.

  - id: nt_pfes
    name: Northern Territory Police, Fire and Emergency Services
    url: https://pfes.nt.gov.au/
    scope: [northern_territory, nt, fire, bushfire, emergency, warnings]
    purpose: Northern Territory police, fire and emergency services information entry point.
    use_when: Verify Northern Territory emergency services information, fire preparedness or alert entry points.

  - id: bom_warnings_alerts
    name: Bureau of Meteorology - Warnings and Alerts
    url: https://www.bom.gov.au/weather-and-climate/warnings-and-alerts
    scope: [australia, weather, fire_weather, warnings]
    purpose: National weather warnings and alerts entry point for severe weather, heat, fire weather and related hazards.
    use_when: Verify weather warnings, heat, smoke, fire weather, severe weather or other meteorological hazards.

  - id: triple_zero
    name: Triple Zero (000)
    url: https://www.triplezero.gov.au/
    scope: [australia, emergency, life_safety]
    purpose: Australian emergency phone number for life-threatening situations.
    use_when: There is immediate danger to life, fire, medical emergency, or urgent rescue need.
